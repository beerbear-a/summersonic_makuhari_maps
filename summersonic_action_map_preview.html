const svg = document.getElementById('svg');
const rg = document.getElementById('range');
const clock = document.getElementById('clock');
function el(name, attrs) { const e=document.createElementNS('http://www.w3.org/2000/svg',name); for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v); return e; }
const routeG=document.getElementById('routes');
data.routes.forEach(r=>{
  const d = r.coords.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
  routeG.appendChild(el('path',{d, class:'route'}));
});
const nodeG=document.getElementById('nodes');
data.points.forEach(p=>{
  nodeG.appendChild(el('circle',{cx:p.x, cy:p.y, r:p.type==='stage'?14:10, class:'node '+(p.type==='stage'?'stage-node':'')}));
  if (['stage','gate','station'].includes(p.type)) nodeG.appendChild(el('text',{x:p.x+18, y:p.y-12, class:'label'})).textContent=p.name;
});
const movingG=document.getElementById('moving');
const actors=[...new Set(movements.map(m=>m.actor_id))];
const dots=Object.fromEntries(actors.map(a=>{const c=el('circle',{cx:0,cy:0,r:12,class:'dot'}); movingG.appendChild(c); return [a,c];}));
let playing=false, timer=null;
const times=movements.map(m=>Date.parse(m.timestamp)); const t0=Math.min(...times), t1=Math.max(...times);
function update(val) {
  const t=t0+(t1-t0)*val/100; clock.textContent=new Date(t).toLocaleTimeString('ja-JP');
  actors.forEach(a=>{
    const arr=movements.filter(m=>m.actor_id===a).sort((m,n)=>Date.parse(m.timestamp)-Date.parse(n.timestamp));
    let m=arr[0]; for (const row of arr) { if (Date.parse(row.timestamp)<=t) m=row; }
    dots[a].setAttribute('cx',m.x); dots[a].setAttribute('cy',m.y);
  });
}
rg.addEventListener('input',()=>update(+rg.value)); update(0);
document.getElementById('play').onclick=()=>{
  playing=!playing; if(timer) clearInterval(timer);
  if(playing) timer=setInterval(()=>{ let v=(+rg.value+1)%101; rg.value=v; update(v); },120);
};
